        const originalFetch = window.fetch;
        let activeFetch = originalFetch;

          get: function() {
            return activeFetch;
          },
          set: function(val) {
            console.log("FTS Shield: Window fetch setter intercepted assignment safely.");
            activeFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("FTS Shield: Unable to override fetch property descriptor.", e);
      }
    </script>
